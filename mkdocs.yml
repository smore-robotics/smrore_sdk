site_name: smrcore_sdk
site_description: Smartmore Robot SDK documentation
site_url: https://smore-robotics.github.io/smrcore_sdk/
repo_url: https://github.com/smore-robotics/smrcore_sdk
repo_name: smore-robotics/smrcore_sdk

plugins:
  - search
  - i18n:
      reconfigure_material: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: smrcore_sdk 文档
          site_description: Smartmore Robot SDK 文档
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            C++ Examples: C++ 示例
            Python Examples: Python 示例
            Overview: 总览
            Basics: 基础
            Motion: 运动
            Configuration: 配置
            Compliance: 柔顺控制
            API Reference: API 参考
            API Summary: API 摘要

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - C++ Examples:
      - Overview: examples/index.md
      - Basics: examples/basics.md
      - Motion: examples/motion.md
      - Configuration: examples/config.md
      - Compliance: examples/compliance.md
  - Python Examples:
      - Python SDK: python/index.md
      - Overview: python/examples/index.md
      - Basics: python/examples/basics.md
      - Motion: python/examples/motion.md
      - Configuration: python/examples/config.md
      - Compliance: python/examples/compliance.md
      - API Summary: python/api.md
  - API Reference: api/index.md

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: .
      check_paths: true
