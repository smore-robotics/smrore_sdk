site_name: smrcore_sdk
site_description: Smartmore Robot SDK documentation
site_url: https://smore-robotics.github.io/smrcore_sdk/
repo_url: https://github.com/smore-robotics/smrcore_sdk
repo_name: smore-robotics/smrcore_sdk

plugins:
  - search
  - i18n:
      reconfigure_material: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: smrcore_sdk 文档
          site_description: Smartmore Robot SDK 文档
          nav_translations:
            Home: 首页
            Install: 安装
            Usage: 使用
            Examples: 示例
            Overview: 总览
            Basics: 基础
            Motion: 运动
            Configuration: 配置
            Compliance: 柔顺控制
            Support: 支持
            API Reference: API 参考

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Install: install.md
  - Usage: usage.md
  - Examples:
      - Overview: examples.md
      - Basics: examples_basics.md
      - Motion: examples_motion.md
      - Configuration: examples_config.md
      - Compliance: examples_compliance.md
  - Support: support.md
  - API Reference: api/index.md

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
      check_paths: true
