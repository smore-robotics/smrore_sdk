name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux-sdk-smoke:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            g++ \
            python3 \
            python3-pip

      - name: Resolve latest release
        run: |
          url="$(curl -Ls -o /dev/null -w '%{url_effective}' https://github.com/smore-robotics/smrore_sdk/releases/latest)"
          version="${url##*/}"
          version="${version#v}"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Could not resolve latest release version from $url" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download C++ SDK
        run: VERSION="$VERSION" ./scripts/download.sh

      - name: Build C++ examples
        run: ./scripts/build.sh

      - name: Check linked libraries
        run: |
          ldd build/01_connect | grep librcoresdk
          ldd build/02_read_state | grep librcoresdk
          ldd build/03_movej | grep librcoresdk
          ldd build/04_movel | grep librcoresdk

      - name: Download Python wheel
        run: |
          PY_TAG=cp310-cp310-linux_x86_64
          curl -L --fail --show-error \
            "https://github.com/smore-robotics/smrore_sdk/releases/download/v${VERSION}/rcore_sdk_py-${VERSION}-${PY_TAG}.whl" \
            -o "rcore_sdk_py-${VERSION}-${PY_TAG}.whl"

      - name: Install and verify Python wheel
        run: |
          python3 -m pip install "./rcore_sdk_py-${VERSION}-cp310-cp310-linux_x86_64.whl"
          python3 - <<'PY'
          import os
          import rcore_sdk
          from rcore_sdk import _native

          version = os.environ["VERSION"]
          info = _native.linked_sdk()
          print(info)

          assert rcore_sdk.__version__ == version
          assert info["linked"] is True
          assert info["version"] == version
          PY

  windows-sdk-smoke:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve latest release
        shell: pwsh
        run: |
          $url = curl.exe -Ls -o NUL -w "%{url_effective}" https://github.com/smore-robotics/smrore_sdk/releases/latest
          $version = Split-Path $url -Leaf
          $version = $version.TrimStart("v")
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Could not resolve latest release version from $url"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download C++ SDK
        shell: pwsh
        run: |
          $asset = "smrcore_sdk-cpp-windows-x86_64-v$env:VERSION.tar.gz"
          $url = "https://github.com/smore-robotics/smrore_sdk/releases/download/v$env:VERSION/$asset"

          Remove-Item -Recurse -Force 3rdparty -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force 3rdparty/smrcore_sdk | Out-Null

          curl.exe -L --fail --show-error $url -o $asset
          tar -xf $asset -C 3rdparty/smrcore_sdk
          Remove-Item -Force $asset

      - name: Build C++ examples
        shell: pwsh
        run: |
          cmake -S examples -B build -DCMAKE_PREFIX_PATH="$pwd/3rdparty/smrcore_sdk"
          cmake --build build --config Release

      - name: Check C++ example outputs
        shell: pwsh
        run: |
          $examples = @("01_connect", "02_read_state", "03_movej", "04_movel")
          foreach ($example in $examples) {
            $path = "build/Release/$example.exe"
            if (!(Test-Path $path)) {
              throw "Missing expected executable: $path"
            }
          }

      - name: Download Python wheel
        shell: pwsh
        run: |
          $pyTag = "cp310-cp310-win_amd64"
          $asset = "rcore_sdk_py-$env:VERSION-$pyTag.whl"
          $url = "https://github.com/smore-robotics/smrore_sdk/releases/download/v$env:VERSION/$asset"
          curl.exe -L --fail --show-error $url -o $asset

      - name: Install and verify Python wheel
        shell: pwsh
        run: |
          python -m pip install ".\rcore_sdk_py-$env:VERSION-cp310-cp310-win_amd64.whl"
          python -c "import os, rcore_sdk; from rcore_sdk import _native; info = _native.linked_sdk(); print(info); assert rcore_sdk.__version__ == os.environ['VERSION']; assert info['linked'] is True; assert info['version'] == os.environ['VERSION']"
