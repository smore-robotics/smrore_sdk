name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux-sdk-smoke:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            g++ \
            python3 \
            python3-pip

      - name: Resolve latest release
        run: |
          url="$(curl -Ls -o /dev/null -w '%{url_effective}' https://github.com/smore-robotics/smrore_sdk/releases/latest)"
          version="${url##*/}"
          version="${version#v}"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Could not resolve latest release version from $url" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download C++ SDK
        run: VERSION="$VERSION" ./scripts/download.sh

      - name: Build C++ examples
        run: ./scripts/build.sh

      - name: Check linked libraries
        run: |
          ldd build/01_connect | grep librcoresdk
          ldd build/02_read_state | grep librcoresdk
          ldd build/03_movej | grep librcoresdk
          ldd build/04_movel | grep librcoresdk

      - name: Download Python wheel
        run: |
          PY_TAG=cp310-cp310-linux_x86_64
          curl -L --fail --show-error \
            "https://github.com/smore-robotics/smrore_sdk/releases/download/v${VERSION}/rcore_sdk_py-${VERSION}-${PY_TAG}.whl" \
            -o "rcore_sdk_py-${VERSION}-${PY_TAG}.whl"

      - name: Install and verify Python wheel
        run: |
          python3 -m pip install "./rcore_sdk_py-${VERSION}-cp310-cp310-linux_x86_64.whl"
          python3 - <<'PY'
          import os
          import rcore_sdk
          from rcore_sdk import _native

          version = os.environ["VERSION"]
          info = _native.linked_sdk()
          print(info)

          assert rcore_sdk.__version__ == version
          assert info["linked"] is True
          assert info["version"] == version
          PY
