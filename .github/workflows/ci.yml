name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # PR / manual runs validate candidate SDK assets from the `prerelease`
  # release, using the version pinned in .sdk-version. Official releases are
  # validated separately by release-smoke.yml.
  linux-sdk-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            g++ \
            libgl1 \
            python3 \
            python3-pip

      - name: Resolve SDK version
        run: |
          version="$(tr -d '[:space:]' < .sdk-version)"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo ".sdk-version must contain x.y.z, got: $version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=prerelease" >> "$GITHUB_ENV"

      - name: Download C++ SDK
        run: SDK_VERSION="$VERSION" SDK_RELEASE_TAG="$RELEASE_TAG" ./scripts/download.sh

      - name: Build C++ examples
        run: ./scripts/build.sh

      - name: Check linked libraries
        run: |
          ldd build/basics_connect | grep librcoresdk
          ldd build/basics_read_state | grep librcoresdk
          ldd build/motion_movej | grep librcoresdk
          ldd build/motion_movel | grep librcoresdk

      - name: Download Python wheel
        run: |
          PY_TAG=cp310-cp310-linux_x86_64
          curl -L --fail --show-error \
            "https://github.com/smore-robotics/smrcore_sdk/releases/download/${RELEASE_TAG}/rcore_sdk_py-${VERSION}-${PY_TAG}.whl" \
            -o "rcore_sdk_py-${VERSION}-${PY_TAG}.whl"

      - name: Install and verify Python wheel
        run: |
          python3 -m pip install "./rcore_sdk_py-${VERSION}-cp310-cp310-linux_x86_64.whl"
          python3 - <<'PY'
          import os
          import rcore_sdk
          from rcore_sdk import _native

          version = os.environ["VERSION"]
          info = _native.linked_sdk()
          print(info)

          assert rcore_sdk.__version__ == version
          assert info["linked"] is True
          assert info["version"] == version
          PY

      - name: Check Python examples
        run: ./scripts/check_python_examples.sh

      # Run the stable example subset against the packaged simulator.
      # Skips with a warning while the prerelease does not yet carry a
      # simulator asset; becomes a hard requirement once the release
      # pipeline publishes simulators (sync enforces 5 assets).
      - name: Download simulator
        run: |
          asset="smrcore-simulator-linux-x86_64-v${VERSION}.tar.gz"
          url="https://github.com/smore-robotics/smrcore_sdk/releases/download/${RELEASE_TAG}/${asset}"
          if curl -L --fail --silent --show-error "$url" -o "$asset"; then
            tar -xzf "$asset"
            echo "SIM_DIR=$PWD/smrcore-simulator" >> "$GITHUB_ENV"
          else
            echo "::warning::simulator asset ${asset} not found in release ${RELEASE_TAG}; skipping simulator tests"
          fi

      - name: Run examples against simulator
        if: env.SIM_DIR != ''
        run: SIM_DIR="$SIM_DIR" ./scripts/run_examples_against_sim.sh

  windows-sdk-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve SDK version
        shell: pwsh
        run: |
          $version = (Get-Content .sdk-version -Raw).Trim()
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw ".sdk-version must contain x.y.z, got: $version"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=prerelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download C++ SDK
        shell: pwsh
        run: |
          $asset = "smrcore_sdk-cpp-windows-x86_64-v$env:VERSION.tar.gz"
          $url = "https://github.com/smore-robotics/smrcore_sdk/releases/download/$env:RELEASE_TAG/$asset"

          Remove-Item -Recurse -Force 3rdparty -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force 3rdparty/smrcore_sdk | Out-Null

          curl.exe -L --fail --show-error $url -o $asset
          tar -xf $asset -C 3rdparty/smrcore_sdk
          Remove-Item -Force $asset

      - name: Build C++ examples
        shell: pwsh
        run: |
          cmake -S examples -B build -DCMAKE_PREFIX_PATH="$pwd/3rdparty/smrcore_sdk"
          cmake --build build --config Release

      - name: Check C++ example outputs
        shell: pwsh
        run: |
          $examples = @("basics_connect", "basics_read_state", "motion_movej", "motion_movel")
          foreach ($example in $examples) {
            $path = "build/Release/$example.exe"
            if (!(Test-Path $path)) {
              throw "Missing expected executable: $path"
            }
          }

      - name: Download Python wheel
        shell: pwsh
        run: |
          $pyTag = "cp310-cp310-win_amd64"
          $asset = "rcore_sdk_py-$env:VERSION-$pyTag.whl"
          $url = "https://github.com/smore-robotics/smrcore_sdk/releases/download/$env:RELEASE_TAG/$asset"
          curl.exe -L --fail --show-error $url -o $asset

      - name: Install and verify Python wheel
        shell: pwsh
        run: |
          python -m pip install ".\rcore_sdk_py-$env:VERSION-cp310-cp310-win_amd64.whl"
          python -c "import os, rcore_sdk; from rcore_sdk import _native; info = _native.linked_sdk(); print(info); assert rcore_sdk.__version__ == os.environ['VERSION']; assert info['linked'] is True; assert info['version'] == os.environ['VERSION']"

      - name: Check Python examples
        shell: pwsh
        run: |
          Get-ChildItem examples_py -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
          }

  # Pushes to main only run lightweight repo checks. Right after a PR merges,
  # the official release for .sdk-version may not exist yet, so main must not
  # depend on release assets.
  main-checks:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check .sdk-version format
        run: |
          version="$(tr -d '[:space:]' < .sdk-version)"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo ".sdk-version must contain x.y.z, got: $version" >&2
            exit 1
          fi
          echo "SDK version: $version"

      - name: Check shell scripts
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done

      - name: Compile Python examples
        run: |
          find examples_py -name '*.py' -print0 | xargs -0 -n1 python -m py_compile

      - name: Build docs
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material mkdocs-static-i18n
          mkdocs build --strict
