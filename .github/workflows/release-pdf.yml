name: Release PDF

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to fetch and attach to (x.y.z or vx.y.z)"
        required: true

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz poppler-utils fonts-noto-cjk
          python -m pip install --upgrade pip
          python -m pip install \
            mkdocs-material mkdocs-static-i18n pypdf reportlab

      - name: Resolve version
        run: |
          version="${{ github.event.inputs.version }}"
          version="${version#v}"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must be x.y.z or vx.y.z, got: ${{ github.event.inputs.version }}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download C++ SDK
        run: VERSION="$VERSION" ./scripts/download.sh

      - name: Build PDF
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          OUT_PDF: site/pdf/smrcore_sdk-docs-zh-v${{ env.VERSION }}.pdf
        run: ./scripts/docs_pdf.sh

      - name: Verify PDF
        env:
          PDF_PATH: site/pdf/smrcore_sdk-docs-zh-v${{ env.VERSION }}.pdf
        run: |
          test -f "$PDF_PATH"
          pdfinfo "$PDF_PATH"
          # Fail if any local path leaked into the PDF text.
          if pdftotext "$PDF_PATH" - | grep -aE "file://|/home/"; then
            echo "PDF text contains local paths" >&2
            exit 1
          fi
          # Fail if any link annotation leaked (pdftotext cannot see these).
          python3 - "$PDF_PATH" <<'PY'
          import sys
          from pypdf import PdfReader
          r = PdfReader(sys.argv[1])
          bad = 0
          for page in r.pages:
              for a in page.get("/Annots") or []:
                  if a.get_object().get("/Subtype") == "/Link":
                      bad += 1
          if bad:
              raise SystemExit(f"PDF still has {bad} link annotation(s)")
          print("no link annotations: ok")
          PY

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smrcore_sdk-docs-zh-pdf
          path: site/pdf/smrcore_sdk-docs-zh-v${{ env.VERSION }}.pdf

      - name: Attach PDF to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: site/pdf/smrcore_sdk-docs-zh-v${{ env.VERSION }}.pdf
