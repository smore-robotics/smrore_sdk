name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Released SDK version to verify (x.y.z or vx.y.z)"
        required: true

jobs:
  linux-release-smoke:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          version="${{ github.event.inputs.version }}"
          version="${version#v}"
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must be x.y.z or vx.y.z, got: ${{ github.event.inputs.version }}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      # Verify the released assets against the examples as they were tagged.
      - name: Checkout release tag
        run: |
          git fetch --force origin "refs/tags/v${VERSION}:refs/tags/v${VERSION}"
          git checkout "v${VERSION}"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            g++ \
            libgl1 \
            python3 \
            python3-pip

      - name: Download C++ SDK
        run: VERSION="$VERSION" ./scripts/download.sh

      - name: Build C++ examples
        run: ./scripts/build.sh

      - name: Check linked libraries
        run: |
          ldd build/basics_connect | grep librcoresdk
          ldd build/basics_read_state | grep librcoresdk
          ldd build/motion_movej | grep librcoresdk
          ldd build/motion_movel | grep librcoresdk

      - name: Download Python wheel
        run: |
          PY_TAG=cp310-cp310-linux_x86_64
          curl -L --fail --show-error \
            "https://github.com/smore-robotics/smrcore_sdk/releases/download/v${VERSION}/rcore_sdk_py-${VERSION}-${PY_TAG}.whl" \
            -o "rcore_sdk_py-${VERSION}-${PY_TAG}.whl"

      - name: Install and verify Python wheel
        run: |
          python3 -m pip install "./rcore_sdk_py-${VERSION}-cp310-cp310-linux_x86_64.whl"
          python3 - <<'PY'
          import os
          import rcore_sdk
          from rcore_sdk import _native

          version = os.environ["VERSION"]
          info = _native.linked_sdk()
          print(info)

          assert rcore_sdk.__version__ == version
          assert info["linked"] is True
          assert info["version"] == version
          PY

      - name: Check Python examples
        run: ./scripts/check_python_examples.sh

      # SDK <-> simulator pairing test: run the stable example subset against
      # the released simulator. Unlike PR CI, this is a hard requirement for
      # official releases - missing asset or VERSION mismatch fails the smoke.
      - name: Download simulator
        run: |
          asset="smrcore-simulator-linux-x86_64-v${VERSION}.tar.gz"
          curl -L --fail --show-error \
            "https://github.com/smore-robotics/smrcore_sdk/releases/download/v${VERSION}/${asset}" \
            -o "$asset"
          tar -xzf "$asset"
          sim_version="$(tr -d '[:space:]' < smrcore-simulator/VERSION)"
          if [ "$sim_version" != "$VERSION" ]; then
            echo "simulator VERSION mismatch: embedded '$sim_version' != target '$VERSION'" >&2
            exit 1
          fi

      - name: Run examples against simulator
        run: SIM_DIR="$PWD/smrcore-simulator" ./scripts/run_examples_against_sim.sh

  windows-release-smoke:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}".TrimStart("v")
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "version must be x.y.z or vx.y.z, got: ${{ github.event.inputs.version }}"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout release tag
        shell: pwsh
        run: |
          git fetch --force origin "refs/tags/v$env:VERSION`:refs/tags/v$env:VERSION"
          git checkout "v$env:VERSION"

      - name: Download C++ SDK
        shell: pwsh
        run: |
          $asset = "smrcore_sdk-cpp-windows-x86_64-v$env:VERSION.tar.gz"
          $url = "https://github.com/smore-robotics/smrcore_sdk/releases/download/v$env:VERSION/$asset"

          Remove-Item -Recurse -Force 3rdparty -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force 3rdparty/smrcore_sdk | Out-Null

          curl.exe -L --fail --show-error $url -o $asset
          tar -xf $asset -C 3rdparty/smrcore_sdk
          Remove-Item -Force $asset

      - name: Build C++ examples
        shell: pwsh
        run: |
          cmake -S examples -B build -DCMAKE_PREFIX_PATH="$pwd/3rdparty/smrcore_sdk"
          cmake --build build --config Release

      - name: Check C++ example outputs
        shell: pwsh
        run: |
          $examples = @("basics_connect", "basics_read_state", "motion_movej", "motion_movel")
          foreach ($example in $examples) {
            $path = "build/Release/$example.exe"
            if (!(Test-Path $path)) {
              throw "Missing expected executable: $path"
            }
          }

      - name: Download Python wheel
        shell: pwsh
        run: |
          $pyTag = "cp310-cp310-win_amd64"
          $asset = "rcore_sdk_py-$env:VERSION-$pyTag.whl"
          $url = "https://github.com/smore-robotics/smrcore_sdk/releases/download/v$env:VERSION/$asset"
          curl.exe -L --fail --show-error $url -o $asset

      - name: Install and verify Python wheel
        shell: pwsh
        run: |
          python -m pip install ".\rcore_sdk_py-$env:VERSION-cp310-cp310-win_amd64.whl"
          python -c "import os, rcore_sdk; from rcore_sdk import _native; info = _native.linked_sdk(); print(info); assert rcore_sdk.__version__ == os.environ['VERSION']; assert info['linked'] is True; assert info['version'] == os.environ['VERSION']"

      - name: Check Python examples
        shell: pwsh
        run: |
          Get-ChildItem examples_py -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
          }
